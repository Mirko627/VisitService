name: NuGet

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MIRKO_NUGET_USERNAME: ${{ secrets.MIRKO_NUGET_USERNAME }}
      MIRKO_NUGET_PWD: ${{ secrets.MIRKO_NUGET_PWD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build

      - name: Push packages to GitHub Packages
        run: |
          dotnet nuget push "**/bin/Release/*.nupkg" \
            --source "Mirko627" \
            --api-key ${{ secrets.MIRKO_NUGET_PWD }} \
            --skip-duplicate